server:
  port: 8081

spring:
  datasource:
    platform: postgres
    url: jdbc:postgresql://localhost:5433/books
    username: postgres
    password: root
    driver-class-name: org.postgresql.Driver
  threads:
    virtual:
      enabled: true
  rabbitmq:
    host: localhost
    port: 5672
    username: book_user
    password: book_password

flyway:
  enabled: true
  locations: classpath:db/migration

jpa:
  hibernate:
    ddl-auto: validate # apenas valida/atualiza schema
    deferred-datasource-initialization: true
